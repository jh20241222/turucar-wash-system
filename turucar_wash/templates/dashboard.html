{% extends "base.html" %}
{% block document_title %}Turu Wash · 홈{% endblock %}
{% block content %}
<section class="home-hero app-card elevated brand-line-card notice-hero">
    <div class="notice-content">
        <img src="{{ url_for('static', filename='img/turucar_logo_brand.png') }}" alt="TuruCar" class="notice-turucar-logo brand-combo-logo">
        <h1>{{ notice_title }}</h1>
        <p class="hero-copy">{{ notice_body }}</p>

        {% if current_user.is_master %}
        <details class="notice-editor">
            <summary>공지사항 수정</summary>
            <form method="post" action="{{ url_for('update_dashboard_notice') }}" class="notice-form">
                <label>
                    <span>제목</span>
                    <input type="text" name="notice_title" value="{{ notice_title }}" class="app-input" maxlength="60">
                </label>
                <label>
                    <span>내용</span>
                    <textarea name="notice_body" class="app-input notice-textarea" rows="3" maxlength="240">{{ notice_body }}</textarea>
                </label>
                <button type="submit" class="btn-primary notice-save-btn">저장</button>
            </form>
        </details>
        {% endif %}
    </div>
</section>


<section class="quick-actions compact-dashboard-actions home-final-actions brand-action-grid">
    <a class="quick-card brand-action-card action-yellow" href="{{ url_for('wash_list') }}">
        <span class="quick-icon action-svg-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img"><path d="M20 10h18l10 10v34H20z"></path><path d="M38 10v12h10"></path><line x1="27" y1="31" x2="41" y2="31"></line><line x1="27" y1="39" x2="39" y2="39"></line><line x1="27" y1="47" x2="34" y2="47"></line></svg>
        </span>
        <strong>세차 오더</strong>
        <small>대상 차량 확인</small>
    </a>
    <a class="quick-card brand-action-card action-orange" href="https://pm.peoplecar.co.kr:8082/#">
        <span class="quick-icon action-svg-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img"><path d="M18 50V23c0-5 4-9 9-9h19c3 0 5 2 5 5v31z"></path><path d="M25 20h18v16H25z"></path><line x1="25" y1="43" x2="34" y2="43"></line><circle cx="45" cy="42" r="2"></circle></svg>
        </span>
        <strong>예약/문제어</strong>
        <small>예약/제어 관리자앱</small>
    </a>
    <a class="quick-card brand-action-card action-red" href="{{ url_for('wash_status') }}">
        <span class="quick-icon action-svg-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img"><path d="M18 10h22l10 10v34H18z"></path><path d="M40 10v12h10"></path><circle cx="34" cy="39" r="10"></circle><path d="M29 39l4 4 8-9"></path></svg>
        </span>
        <strong>완료 현황</strong>
        <small>작업 기록 조회</small>
    </a>
</section>
{% endblock %}
