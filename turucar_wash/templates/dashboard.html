{% extends "base.html" %}
{% block content %}
<style>
/* ===== TURU HOME V9: preview-matched, dashboard-only ===== */
html, body { min-height: 100%; }
body {
  margin: 0 !important;
  background:
    radial-gradient(circle at 88% -10%, rgba(255,128,33,.08), transparent 30%),
    linear-gradient(180deg,#fbfcfe 0%,#f4f7fb 56%,#edf2f8 100%) !important;
  font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
  color: #111827 !important;
}
.layout { display: block !important; min-height: 100vh !important; }
.sidebar, .desktop-sidebar, .app-topbar { display: none !important; }
.content, .app-main {
  margin: 0 !important;
  padding: 0 !important;
  width: 100% !important;
  max-width: none !important;
  min-height: 100vh !important;
  background: transparent !important;
}

.turu-home-v9 {
  --orange: #ff6b00;
  --yellow: #fbc400;
  --red: #eb2451;
  --ink: #111827;
  --muted: #687385;
  --line: #e3e9f1;
  --shadow: 0 16px 38px rgba(9,30,63,.075);
  width: min(100%, 430px);
  margin: 0 auto;
  min-height: 100svh;
  padding: calc(32px + env(safe-area-inset-top)) 18px calc(104px + env(safe-area-inset-bottom));
  box-sizing: border-box;
}

.turu-home-logo { margin: 0 0 28px; display: flex; align-items: center; }
.turu-home-logo img { width: 176px; height: auto; display: block; object-fit: contain; }

.turu-card {
  background: rgba(255,255,255,.97);
  border: 1px solid rgba(221,228,237,.9);
  border-radius: 28px;
  box-shadow: var(--shadow);
}

.notice-card-v9 {
  padding: 22px 22px 24px;
  margin-bottom: 26px;
}
.notice-head-v9 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
}
.notice-head-v9 h2 {
  margin: 0;
  font-size: 24px;
  line-height: 1.15;
  letter-spacing: -.055em;
  font-weight: 800;
  color: var(--ink);
}
.notice-more-v9 {
  min-width: 64px;
  height: 42px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 15px;
  border-radius: 999px;
  border: 1px solid #dfe6f0;
  background: #fff;
  color: #111827;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  box-shadow: 0 5px 14px rgba(9,30,63,.045);
}
.notice-body-v9 {
  min-height: 138px;
  display: grid;
  grid-template-columns: 126px minmax(0,1fr);
  align-items: center;
  gap: 18px;
}
.notice-mega-v9 {
  width: 126px;
  height: 112px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.notice-mega-v9 svg { width: 100%; height: 100%; display: block; overflow: visible; }
.notice-copy-v9 strong {
  display: block;
  margin: 0 0 12px;
  color: var(--ink);
  font-size: 19px;
  line-height: 1.34;
  letter-spacing: -.055em;
  font-weight: 800;
  word-break: keep-all;
}
.notice-copy-v9 span {
  display: block;
  color: #6f7785;
  font-size: 16px;
  line-height: 1.55;
  letter-spacing: -.04em;
  font-weight: 500;
  word-break: keep-all;
}

.action-grid-v9 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.action-card-v9 {
  min-width: 0;
  min-height: 248px;
  padding: 18px 9px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  color: inherit;
  text-decoration: none;
  overflow: hidden;
}
.action-icon-v9 {
  width: 118px;
  height: 108px;
  flex: 0 0 108px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.action-icon-v9 svg { width: 100%; height: 100%; display: block; overflow: visible; }
.action-card-v9 strong {
  display: block;
  width: 100%;
  margin: 0;
  color: var(--ink);
  font-size: 20px;
  line-height: 1.15;
  letter-spacing: -.065em;
  font-weight: 780;
  white-space: nowrap;
}
.action-card-v9 small {
  display: block;
  width: 100%;
  margin: 9px 0 0;
  color: #687385;
  font-size: 13px;
  line-height: 1.3;
  letter-spacing: -.045em;
  font-weight: 500;
  white-space: nowrap;
}
.arrow-v9 {
  margin-top: auto;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 26px;
  line-height: 1;
  font-weight: 800;
  font-style: normal;
  box-shadow: 0 8px 18px rgba(255,107,0,.22);
}
.arrow-yellow { background: linear-gradient(135deg,#ffc400,#ffad00); }
.arrow-orange { background: linear-gradient(135deg,#ff7a00,#ff4d00); }
.arrow-red { background: linear-gradient(135deg,#ff335f,#e91647); }

.support-row-v9 {
  display: grid;
  grid-template-columns: repeat(2,minmax(0,1fr));
  gap: 14px;
  margin-bottom: 26px;
}
.support-card-v9 {
  min-height: 72px;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 48px minmax(0,1fr) 16px;
  align-items: center;
  gap: 10px;
  color: inherit;
  text-decoration: none;
  border-radius: 22px;
}
.support-icon-v9 { width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; }
.support-icon-v9 svg { width: 100%; height: 100%; display:block; overflow:visible; }
.support-card-v9 strong {
  color: var(--ink);
  font-size: 17px;
  line-height: 1;
  font-weight: 760;
  letter-spacing: -.045em;
  white-space: nowrap;
}
.support-card-v9 em {
  color: #687385;
  font-size: 30px;
  line-height: 1;
  font-style: normal;
  font-weight: 500;
}

.tabbar-v9 {
  position: fixed;
  left: 50%;
  bottom: calc(14px + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  width: min(calc(100% - 32px), 398px);
  min-height: 74px;
  padding: 8px 8px;
  display: grid;
  grid-template-columns: repeat(5,1fr);
  align-items: center;
  gap: 2px;
  background: rgba(255,255,255,.96);
  border: 1px solid rgba(221,228,237,.82);
  border-radius: 27px;
  box-shadow: 0 18px 45px rgba(9,30,63,.12);
  z-index: 30;
  backdrop-filter: blur(16px);
}
.tabitem-v9 {
  height: 58px;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #6b7481;
  text-decoration: none;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: -.035em;
}
.tabitem-v9.active { color: var(--orange); background: rgba(255,107,0,.095); }
.tabitem-v9 svg { width: 25px; height: 25px; display:block; stroke: currentColor; }

/* icon details */
.car-body { fill:#fff2d7; }
.car-line { fill:#ff7a00; }
.car-window { fill:#172436; }
.car-dark { fill:#172436; }
.car-light { fill:#fffefa; }
.soft-shadow { fill:rgba(248,179,50,.22); }

@media (min-width: 901px) {
  .turu-home-v9 { width: min(100%, 940px); padding-top: 60px; padding-bottom: 46px; }
  .turu-home-logo img { width: 250px; }
  .notice-card-v9 { padding: 34px 40px 34px; border-radius: 34px; }
  .notice-body-v9 { grid-template-columns: 210px minmax(0,1fr); min-height: 192px; gap: 32px; }
  .notice-mega-v9 { width: 190px; height: 156px; }
  .notice-head-v9 h2 { font-size: 32px; }
  .notice-copy-v9 strong { font-size: 26px; }
  .notice-copy-v9 span { font-size: 21px; }
  .action-grid-v9 { gap: 24px; margin-top: 28px; }
  .action-card-v9 { min-height: 336px; border-radius: 32px; padding: 28px 20px 26px; }
  .action-icon-v9 { width: 184px; height: 158px; flex-basis:158px; margin-bottom: 22px; }
  .action-card-v9 strong { font-size: 28px; }
  .action-card-v9 small { font-size: 17px; }
  .support-row-v9 { gap: 24px; }
  .support-card-v9 { min-height: 98px; border-radius: 29px; padding: 18px 28px; grid-template-columns: 64px minmax(0,1fr) 20px; }
  .support-icon-v9 { width: 58px; height: 58px; }
  .support-card-v9 strong { font-size: 24px; }
  .tabbar-v9 { position: static; transform:none; width:100%; margin: 34px auto 0; min-height: 96px; border-radius: 34px; }
  .tabitem-v9 { height: 76px; font-size: 15px; gap: 7px; }
  .tabitem-v9 svg { width: 32px; height: 32px; }
}

@media (max-width: 390px) {
  .turu-home-v9 { padding-left: 14px; padding-right: 14px; }
  .turu-home-logo { margin-bottom: 24px; }
  .turu-home-logo img { width: 158px; }
  .notice-card-v9 { padding: 19px 18px 22px; border-radius: 24px; }
  .notice-body-v9 { grid-template-columns: 108px minmax(0,1fr); gap: 14px; min-height: 124px; }
  .notice-mega-v9 { width: 108px; height: 96px; }
  .notice-head-v9 h2 { font-size: 22px; }
  .notice-copy-v9 strong { font-size: 17px; }
  .notice-copy-v9 span { font-size: 14px; }
  .action-grid-v9 { gap: 10px; }
  .action-card-v9 { min-height: 226px; padding: 15px 6px 16px; border-radius: 22px; }
  .action-icon-v9 { width: 96px; height: 91px; flex-basis:91px; margin-bottom: 17px; }
  .action-card-v9 strong { font-size: 17px; }
  .action-card-v9 small { font-size: 11px; }
  .arrow-v9 { width: 30px; height: 30px; font-size: 23px; }
  .support-row-v9 { gap: 10px; }
  .support-card-v9 { min-height: 62px; border-radius: 18px; padding: 10px 11px; grid-template-columns: 40px minmax(0,1fr) 13px; }
  .support-icon-v9 { width: 38px; height: 38px; }
  .support-card-v9 strong { font-size: 14px; }
  .tabbar-v9 { width: calc(100% - 24px); min-height: 66px; border-radius: 23px; }
  .tabitem-v9 { height: 52px; font-size: 10px; border-radius: 16px; }
}
</style>
