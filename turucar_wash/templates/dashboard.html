{% extends "base.html" %}
{% block document_title %}Turu Wash · 홈{% endblock %}
{% block content %}
<section class="home-hero app-card elevated brand-line-card notice-hero">
    <div class="notice-content">
        <img src="{{ url_for('static', filename='img/turucar_logo.png') }}" alt="TuruCar" class="notice-turucar-logo">
        <h1>{{ notice_title }}</h1>
        <p class="hero-copy">{{ notice_body }}</p>

        {% if current_user.is_master %}
        <details class="notice-editor">
            <summary>공지사항 수정</summary>
            <form method="post" action="{{ url_for('update_dashboard_notice') }}" class="notice-form">
                <label>
                    <span>제목</span>
                    <input type="text" name="notice_title" value="{{ notice_title }}" class="app-input" maxlength="60">
                </label>
                <label>
                    <span>내용</span>
                    <textarea name="notice_body" class="app-input notice-textarea" rows="3" maxlength="240">{{ notice_body }}</textarea>
                </label>
                <button type="submit" class="btn-primary notice-save-btn">저장</button>
            </form>
        </details>
        {% endif %}
    </div>
</section>


<section class="quick-actions compact-dashboard-actions home-final-actions">
    <a class="quick-card primary home-action-orange" href="{{ url_for('wash_list') }}">
        <span class="quick-icon">▣</span>
        <strong>세차 오더</strong>
        <small>대상 차량 확인</small>
    </a>
    <a class="quick-card primary home-action-orange" href="https://pm.peoplecar.co.kr:8082/#">
        <span class="quick-icon">↗</span>
        <strong>예약/문제어</strong>
        <small>예약/제어 관리자앱</small>
    </a>
    <a class="quick-card primary home-action-orange" href="{{ url_for('wash_status') }}">
        <span class="quick-icon">✓</span>
        <strong>완료 현황</strong>
        <small>작업 기록 조회</small>
    </a>
</section>
{% endblock %}
