{% extends "base_login.html" %}
{% block content %}
<main class="login-screen">
    <section class="phone-frame login-card">
        <div class="login-hero">
            <div class="login-brand-lockup">
                <img src="{{ url_for('static', filename='img/turu_wash_lockup_white.png') }}" alt="Turu Wash">
            </div>
            <p class="eyebrow">FIELD WASH ORDER</p>
            <h1>세차 오더를<br>한 번에 처리</h1>
            <p>Railway 서버와 연결된 Turu Wash 현장 관리 앱입니다.</p>
        </div>

        <form method="POST" class="login-form">
            <label class="field-label" for="username">아이디</label>
            <input id="username" class="app-input" type="text" name="username" value="{{ saved_id or '' }}" autocomplete="username" placeholder="아이디 입력">

            <label class="field-label" for="password">비밀번호</label>
            <input id="password" class="app-input" type="password" name="password" autocomplete="current-password" placeholder="비밀번호 입력">

            <div class="login-options">
                <label><input type="checkbox" name="id_save" {% if saved_id %}checked{% endif %}> 아이디 저장</label>
                <label><input type="checkbox" name="auto_login" {% if session.get('auto_login') %}checked{% endif %}> 자동 로그인</label>
            </div>

            <button class="primary-btn full" type="submit">로그인</button>

            {% for msg in get_flashed_messages() %}
                <p class="form-error">{{ msg }}</p>
            {% endfor %}
        </form>
    </section>
</main>
{% endblock %}
