{% extends "base.html" %}
{% block document_title %}Turu Wash · 문의하기{% endblock %}
{% block content %}

{# ══ 모바일 채팅 UI ══ #}
<div class="turu-chat-screen" id="chatScreen">
  <div class="turu-chat-body" id="chatBody"></div>
  <div class="turu-chat-inputbar" id="chatInputbar">
    <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." autocomplete="off" autocorrect="off">
    <button type="button" id="chatSendBtn" onclick="sendUserMsg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

{# 실제 제출 폼 (hidden) #}
<form id="supportForm" method="post" action="{{ url_for('support_submit') }}" style="display:none;">
  <input type="hidden" name="car_number" id="fCarNumber">
  <input type="hidden" name="category"   id="fCategory">
  <input type="hidden" name="message"    id="fMessage">
</form>

{# ══ 데스크탑 ══ #}
<div id="d-support-submit" style="display:none;">
  <div class="d-wrap" style="max-width:600px;">
    <form method="post" action="{{ url_for('support_submit') }}"
          style="display:flex;flex-direction:column;gap:16px;">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="field-group">
          <label class="field-label">차량번호 <span class="required">*</span></label>
          <input type="text" name="car_number" class="d-input" placeholder="예: 12가 3456" required>
        </div>
        <div class="field-group">
          <label class="field-label">문의 유형</label>
          <select name="category" class="d-input">
            <option value="일반">일반 문의</option>
            <option value="세차">세차 관련</option>
            <option value="차량">차량 관련</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">문의 내용 <span class="required">*</span></label>
        <textarea name="message" class="d-input" rows="5"
                  placeholder="문의 내용을 자세히 입력해주세요." required></textarea>
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <a href="{{ url_for('support_choice') }}" class="d-btn d-btn-gray">취소</a>
        <button type="submit" class="d-btn d-btn-orange">문의 제출</button>
      </div>
    </form>
  </div>
</div>

<style>
/* ── 채팅 화면 레이아웃 (모바일) ── */
.turu-chat-screen {
  position: fixed;
  top: 56px;          /* 상단바 높이 */
  bottom: 64px;       /* 하단 탭바 높이 — 탭바 위에 표시 */
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  background: var(--background, #f5f5f5);
  z-index: 10;
}

.turu-chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}

.turu-chat-inputbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface, #fff);
  border-top: 1px solid var(--border, #e0e0e0);
  flex-shrink: 0;
}
.turu-chat-inputbar input {
  flex: 1;
  border: 1.5px solid var(--border, #e0e0e0);
  border-radius: 22px;
  padding: 10px 16px;
  font-size: 15px;
  background: var(--background, #f5f5f5);
  color: var(--text-primary, #212121);
  outline: none;
  font-family: inherit;
}
.turu-chat-inputbar input:focus {
  border-color: #FF9900;
}
.turu-chat-inputbar button {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #FF9900;
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #fff;
  flex-shrink: 0;
  transition: background .15s;
}
.turu-chat-inputbar button:active { background: #e68900; }

/* ── 봇 메시지 ── */
.chat-bot-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.chat-bot-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF9900, #ff6b35);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}
.chat-bot-bubble {
  max-width: 75%;
  background: var(--surface, #fff);
  border: 1px solid var(--border, #e0e0e0);
  border-radius: 18px 18px 18px 4px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary, #212121);
}

/* ── 사용자 메시지 ── */
.chat-user-row {
  display: flex;
  justify-content: flex-end;
}
.chat-user-bubble {
  max-width: 75%;
  background: #FF9900;
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
}

/* ── 선택지 버튼 ── */
.chat-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding-left: 40px; /* avatar 너비 + gap 만큼 들여쓰기 */
  margin-top: -4px;
}
.chat-option-btn {
  background: var(--surface, #fff);
  border: 1.5px solid #FF9900;
  color: #FF9900;
  border-radius: 20px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background .12s, color .12s;
  font-family: inherit;
}
.chat-option-btn:active {
  background: #FF9900;
  color: #fff;
}

/* ── 데스크탑 ── */
#desktop-mode #d-support-submit { display: block !important; }
#desktop-mode .turu-chat-screen { display: none !important; }

.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.required     { color: #e53935; }
textarea.d-input { resize: vertical; min-height: 100px; width: 100%; box-sizing: border-box; }
</style>

<script>
(function () {
  let step = 0;
  let carNumber = '';
  let category  = '';

  const chatBody    = document.getElementById('chatBody');
  const chatInput   = document.getElementById('chatInput');
  const chatInputbar = document.getElementById('chatInputbar');

  /* ── 메시지 추가 헬퍼 ── */
  function addBot(html) {
    const row = document.createElement('div');
    row.className = 'chat-bot-row';
    row.innerHTML =
      '<div class="chat-bot-avatar">🤖</div>' +
      '<div class="chat-bot-bubble">' + html + '</div>';
    chatBody.appendChild(row);
    scrollBottom();
  }

  function addUser(text) {
    const row = document.createElement('div');
    row.className = 'chat-user-row';
    row.innerHTML = '<div class="chat-user-bubble">' + escHtml(text) + '</div>';
    chatBody.appendChild(row);
    scrollBottom();
  }

  function showOptions(opts) {
    const wrap = document.createElement('div');
    wrap.className = 'chat-options';
    wrap.id = 'chatOptions';
    opts.forEach(function(o) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chat-option-btn';
      btn.textContent = o.label;
      btn.onclick = function() { pickCategory(o.label, o.value); };
      wrap.appendChild(btn);
    });
    chatBody.appendChild(wrap);
    scrollBottom();
  }

  function scrollBottom() {
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── 전송 버튼 ── */
  window.sendUserMsg = function() {
    const text = chatInput.value.trim();
    if (!text) return;

    addUser(text);
    chatInput.value = '';

    if (step === 1) {
      carNumber = text;
      step = 2;
      chatInputbar.style.display = 'none';
      setTimeout(function() {
        addBot('문의 유형을 선택해주세요.');
        showOptions([
          { label: '일반 문의', value: '일반' },
          { label: '세차 관련', value: '세차' },
          { label: '차량 관련', value: '차량' },
          { label: '기타',     value: '기타'  }
        ]);
      }, 300);

    } else if (step === 3) {
      step = 4;
      document.getElementById('fCarNumber').value = carNumber;
      document.getElementById('fCategory').value  = category;
      document.getElementById('fMessage').value   = text;
      setTimeout(function() {
        addBot('문의가 접수됩니다. 잠시만 기다려주세요… ⏳');
        setTimeout(function() {
          document.getElementById('supportForm').submit();
        }, 700);
      }, 300);
    }
  };

  function pickCategory(label, value) {
    var opts = document.getElementById('chatOptions');
    if (opts) opts.remove();
    addUser(label);
    category = value;
    step = 3;
    chatInputbar.style.display = 'flex';
    setTimeout(function() {
      addBot('문의 내용을 자세히 입력해주세요.');
      chatInput.focus();
    }, 300);
  }

  /* Enter 키 전송 */
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendUserMsg();
    }
  });

  /* 시작 */
  step = 1;
  setTimeout(function() {
    addBot('안녕하세요! 😊<br>문의할 <strong>차량 번호</strong>를 입력해주세요.<br><small style="color:var(--text-secondary)">예: 12가 3456</small>');
    chatInput.focus();
  }, 200);
})();
</script>

{% endblock %}
